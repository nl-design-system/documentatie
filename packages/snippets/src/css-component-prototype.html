<!doctype html>
<html lang="nl" dir="ltr" class="voorbeeld-theme">
  <head>
    <meta charset="utf-8" />
    <title>Prototype met CSS componenten</title>
    <!-- Warning: do not add CDN domains to `connect-src` in the Content-Security-Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        base-uri 'self';
        block-all-mixed-content;
        connect-src 'self' blob: data:;
        default-src 'self';
        font-src 'self' https://unpkg.com/@fontsource/;
        form-action 'self';
        img-src 'self' blob: data:;
        object-src 'none';
        script-src 'self' 'strict-dynamic' blob:;
        style-src  'self' https://unpkg.com/@fontsource/ https://unpkg.com/@nl-design-system-unstable/ https://unpkg.com/@nl-design-system-candidate/ https://unpkg.com/@utrecht/;
        worker-src blob:;
      "
    />

    <!-- Voorbeeld Theme -->
    <link rel="stylesheet" href="https://unpkg.com/@nl-design-system-unstable/voorbeeld-design-tokens/dist/theme.css" />

    <!-- Web Fonts -->
    <link rel="stylesheet" href="https://unpkg.com/@fontsource/noto-sans/index.css" />
    <link rel="stylesheet" href="https://unpkg.com/@fontsource/noto-sans-mono/index.css" />
    <link rel="stylesheet" href="https://unpkg.com/@fontsource/noto-serif/index.css" />
    <link rel="stylesheet" href="https://unpkg.com/@fontsource/noto-serif/700.css" />

    <!-- CSS components -->
    <link rel="stylesheet" href="https://unpkg.com/@nl-design-system-candidate/heading-css/dist/heading.css" />
    <link rel="stylesheet" href="https://unpkg.com/@nl-design-system-candidate/paragraph-css/dist/paragraph.css" />
    <link rel="stylesheet" href="https://unpkg.com/@nl-design-system-candidate/link-css/dist/link.css" />
    <link rel="stylesheet" href="https://unpkg.com/@nl-design-system-candidate/button-css/dist/button.css" />
    <link rel="stylesheet" href="https://unpkg.com/@nl-design-system-candidate/mark-css/dist/mark.css" />
    <link rel="stylesheet" href="https://unpkg.com/@utrecht/component-library-css/dist/index.css" />
  </head>
  <body>
    <h1 class="nl-heading nl-heading--level-1">Prototype met CSS componenten</h1>
    <p class="nl-paragraph">
      Bekijk de broncode van deze pagina om te zien hoe de componenten en design tokens zijn geladen vanaf een CDN.
    </p>
    <h2 class="nl-heading nl-heading--level-2">Heading 2</h2>
    <h3 class="nl-heading nl-heading--level-3">Heading 3</h3>
    <h4 class="nl-heading nl-heading--level-4">Heading 4</h4>
    <h5 class="nl-heading nl-heading--level-5">Heading 5</h5>
    <h6 class="nl-heading nl-heading--level-6">Heading 6</h6>
    <p class="nl-paragraph">Paragraph</p>
    <p class="nl-paragraph"><mark class="nl-mark">Mark</mark></p>
    <p class="nl-paragraph"><a class="nl-link" href="#">Link</a></p>
    <p class="nl-paragraph"><button class="nl-button">Click me</button></p>
    <p class="nl-paragraph"><input class="utrecht-textbox" type="text" value="Hello, world!" /></p>
  </body>
</html>
