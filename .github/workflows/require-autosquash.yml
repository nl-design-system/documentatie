name: Pull Request

on: pull_request

permissions: {}

jobs:
  message-check:
    name: Block Autosquash Commits
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Block Autosquash Commits
        uses: xt0rted/block-autosquash-commits-action@79880c36b4811fe549cfffe20233df88876024e7 # v2.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
