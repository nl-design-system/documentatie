version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        applies-to: "version-updates"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      docusaurus:
        applies-to: "version-updates"
        patterns:
          - "@docusaurus/*"
        update-types:
          - "patch"
          - "minor"
      storybook:
        applies-to: "version-updates"
        patterns:
          - "@storybook/*"
          - "storybook"
        update-types:
          - "patch"
          - "minor"
      patch-and-minor-dependencies:
        applies-to: "version-updates"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 20
